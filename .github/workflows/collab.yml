name: Build Project on Google Collab (Execution)
on: [pull_request]
jobs:
  execution-checks:
    runs-on: "runs-on=${{ github.run_id }}/family=g4dn.2xlarge/image=ubuntu24-gpu-x64/volume=80gb/spot=false"
    container:
      image: docker://us-docker.pkg.dev/colab-images/public/runtime
      options: --gpus all
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Check nvidia drivers
        shell: bash -l {0}
        run: |
          nvidia-smi
      - name: Check python version
        shell: bash -l {0}
        run: |
          python --version
      - name: Display Pip Versions
        shell: bash -l {0}
        run: pip list
      - name: Download "build" folder (cache)
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: cache.yml
          branch: main
          name: build-cache
          path: _build
      # Install build software (pip dependencies sourced from environment.yml
      # so this stays in sync with the conda build — see #303)
      - name: Install Build Software
        shell: bash -l {0}
        run: |
          pip install pyyaml
          python -c "import yaml; deps = next(d['pip'] for d in yaml.safe_load(open('environment.yml'))['dependencies'] if isinstance(d, dict) and 'pip' in d); open('colab-requirements.txt', 'w').write('\n'.join(deps) + '\n')"
          cat colab-requirements.txt
          pip install -r colab-requirements.txt
      # Build of HTML (Execution Testing)
      - name: Build HTML
        shell: bash -l {0}
        run: |
          jb build lectures --path-output ./ -n -W --keep-going
      - name: Upload Execution Reports
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: execution-reports
          path: _build/html/reports
